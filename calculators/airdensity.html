<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Density Calculator</title>
<link rel="stylesheet" href="../style.css">

<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
  chtml: { displayAlign: "left", displayIndent: "0em" }
};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

<header><h1>Air Density (ISA)</h1></header>

<main>
<section class="card">

<h3>Formulas</h3>

\[
T = T_0 - Lh
\]

\[
p = p_0 \left(\frac{T}{T_0}\right)^{\frac{g}{RL}}
\]

\[
\rho = \frac{p}{RT}
\]

<hr>

<label>Altitude h (m):</label>
<input id="h">

<button onclick="calc()">Calculate</button>

<p id="out"></p>

</section>
</main>

<script>
function calc() {
  const h = parseFloat(document.getElementById("h").value);

  const T0 = 288.15;
  const p0 = 101325;
  const R = 287.05;
  const g = 9.80665;
  const L = 0.0065;

  const T = T0 - L * h;
  const p = p0 * Math.pow(T / T0, g / (R * L));
  const rho = p / (R * T);

  document.getElementById("out").innerText = "ρ = " + rho.toFixed(3) + " kg/m³";
}
</script>

</body>
</html>
